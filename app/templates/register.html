{% extends "base.html" %}
{% block title %}Register — StudentDining{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Create account</h1>
  <form method="post">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" required autofocus>

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required placeholder="kuid@alumni.ku.dk">

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required>

    <button class="btn btn-primary btn-full" type="submit">Create account</button>
  </form>
  <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}
